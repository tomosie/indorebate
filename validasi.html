<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Account Validation</title>

<style>
    
body{
    font-family: Arial, sans-serif;
    max-width:600px;
    margin:50px auto;
    padding:20px;
}

.btn-gold{
    background: linear-gradient(135deg,#d4af37,#f7d774);
    color:#000;
    border:none;
    padding:14px 25px;
    border-radius:30px;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
}
    
h1{
    text-align:center;
}

form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

input{
    padding:12px;
    font-size:16px;
}

button{
    padding:14px;
    cursor:pointer;
    font-size:16px;
}

</style>

</head>
<body>

<h1>Indorebate Account Validation</h1>

<form action="https://formspree.io/f/xrewplql" method="POST">

    <input
        type="text"
        name="full_name"
        placeholder="NAMA LENGKAP"
        required>

    <input
        type="text"
        name="account_number"
        placeholder="NOMOR AKUN TRADING"
        inputmode="numeric"
        pattern="[0-9]+"
        required>

    <input
        type="text"
        name="broker_name"
        placeholder="NAMA BROKER"
        required>

    <input
        type="email"
        name="email"
        placeholder="EMAIL ADDRESS"
        required>

    <button type="submit" class="btn-gold">
        VALIDATE ACCOUNT
    </button>

</form>

</body>
</html>
